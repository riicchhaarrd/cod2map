name: Build cod2map

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_TYPE: Release

jobs:
  native:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            artifact: cod2map-windows-x64
          - name: Linux x64
            os: ubuntu-latest
            artifact: cod2map-linux-x64
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp build/${{ env.BUILD_TYPE }}/cod2map.exe dist/
          else
            cp build/cod2map dist/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  wasm:
    name: WebAssembly demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Configure Wasm build
        run: |
          emcmake cmake -S . -B build-wasm \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCOD2MAP_WASM=ON

      - name: Build Wasm
        run: cmake --build build-wasm --config ${{ env.BUILD_TYPE }} --parallel

      - name: Stage demo site
        run: |
          mkdir -p site
          cp web/* site/
          cp build-wasm/cod2map.js site/
          cp build-wasm/cod2map.wasm site/
          touch site/.nojekyll

      - name: Upload Wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: cod2map-wasm-demo
          path: site

      - name: Publish demo to gh-pages
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          cd site
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy cod2map browser demo"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
